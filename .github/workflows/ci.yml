name: CI — unit tests + eval gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: deterministic unit tests — no secrets, runs in ~3s
  unit-tests:
    name: Unit tests (deterministic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/ -v

  # Job 2: eval suite against live DB + LLM — runs after unit tests pass
  evals:
    name: Eval suite (7 golden cases)
    runs-on: ubuntu-latest
    needs: unit-tests
    # Skip evals on PRs from forks (no access to secrets)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run eval suite
        run: uv run python evals/run.py
        env:
          DATABASE_URL_RO: ${{ secrets.DATABASE_URL_RO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONIOENCODING: utf-8
